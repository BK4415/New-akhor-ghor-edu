<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>আখৰ ঘৰ</title>
    <meta name="theme-color" content="#FF5A52" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#121418" media="(prefers-color-scheme: dark)">
    
    <link rel="manifest" href="manifest.json">
    
    <!-- CSS Connection -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">

    <style>body { background-color: #FDF6E4; margin: 0; overflow: hidden; }</style>
</head>
<body class="native-mode">

    <!-- Native Splash Screen -->
    <div id="splash-screen">
        <div class="splash-logo">অ</div>
        <div class="splash-loader"><div class="loader-progress"></div></div>
        <p style="margin-top:20px; font-weight:700; color:#5B6070;">আখৰ ঘৰ</p>
    </div>

    <!-- App Shell -->
    <div id="app-shell">
        <header class="app-bar">
            <button id="menu-trigger" class="icon-btn" data-icon="menu"></button>
            <div class="app-identity">
                <span class="logo-small">অ</span>
                <h1 id="page-title">আখৰ ঘৰ</h1>
            </div>
            <button id="audio-toggle" class="icon-btn" data-icon="speaker"></button>
        </header>

        <!-- Content Area -->
        <main id="router-outlet" class="fade-in"></main>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-link="home"><div class="nav-icon" data-icon="home"></div><span>ঘৰ</span></button>
            <button class="nav-item" data-link="vowels"><div class="nav-icon" data-icon="learn"></div><span>শিকা</span></button>
            <button class="nav-item" data-link="games"><div class="nav-icon" data-icon="game"></div><span>খেল</span></button>
            <button class="nav-item" data-link="profile"><div class="nav-icon" data-icon="profile"></div><span>মই</span></button>
        </nav>
    </div>

    <div id="drawer-overlay" class="overlay"></div>
    <aside id="app-drawer"></aside>

    <!-- Main Logic -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
